name: Ultimate Monolithic Deploy - UniTransfer Hub

on:
  push:
    branches:
      - main
      - addsomethings # ⭐ 雙雷達全開：以後管你推到 dev 還是正式 main，這唯一一份劇本通通幫你自動烤好送餐！
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v4 # 升級旗艦版 v4
        with:
          node-version: '22.x'

      # ⭐ 智慧雙層套件點火：同時灌飽根目錄與 server/ 後端廚房！
      - name: npm install, build, and test
        run: |
          npm install
          npm run build --if-present
          npm run test --if-present
          
          # 檢測若存在 server 資料夾，自動走進去把 Express, sql.js 等後端核心套件妥妥裝好
          if [ -d "server" ]; then
            echo "Installing backend dependencies in server/..."
            cd server
            npm install
            cd ..
          fi

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: .

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
      
      # 你的 Azure 皇家安全憑證金鑰已完整保留
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_A05C2AAC5EDA49E6AD588E0FE9747701 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_941DBE40E3624D3EA6076D7F2998D525 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_66347F594C7B44DB8AF545E959EB4A01 }}

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'Web-Final-UniTransfer-Hub'
          slot-name: 'Production'
          package: .
