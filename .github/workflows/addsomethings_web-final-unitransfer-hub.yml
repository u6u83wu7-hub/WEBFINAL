name: Monolithic Fusion Deploy - UniTransfer Hub

on:
  push:
    branches:
      - addsomethings
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      # ⭐ 1. 順便把 Node 版本推上 22.x，徹底撕爛 GitHub 碎碎唸的黃字嘴！
      - name: Set up Node.js version
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'

      - name: 1. 走進 client 廚房：焦土清場並編譯前端
        run: |
          echo "Building client..."
          cd client
          # ★ 絕對殺手鐧：把從 Windows 偷渡上來的 node_modules 實體徹底燒毀！
          rm -rf node_modules package-lock.json
          npm install
          # ★ 權限破道指令：改用 npx 強制召喚 vite，無視 Linux 底層的捷徑權限鎖！
          npx vite build
          cd ..

      - name: 2. 將前端外送盒搬運進 server 的供桌上
        run: |
          echo "Merging dist into server/public..."
          mkdir -p server/public
          cp -R client/dist/* server/public/

      - name: 3. 走進 server 廚房：清場並安裝後端套件
        run: |
          echo "Installing server dependencies..."
          cd server
          rm -rf node_modules package-lock.json # 後端比照辦理，斬草除根
          npm install
          cd ..

      - name: 4. 打包後端廚房作為最終雲端包裹
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: ./server 

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
      
      # 你的 Azure 皇家安全憑證金鑰已完整保留
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_A05C2AAC5EDA49E6AD588E0FE9747701 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_941DBE40E3624D3EA6076D7F2998D525 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_66347F594C7B44DB8AF545E959EB4A01 }}

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'Web-Final-UniTransfer-Hub'
          slot-name: 'Production'
          package: .
